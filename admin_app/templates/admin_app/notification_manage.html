{% extends "admin_app/admin_base.html" %}

{% block admin_content %}
<h4 class="fw-bold mb-4"><i class="bi bi-bell me-2"></i>알림 관리</h4>

<ul class="nav nav-tabs mb-3" role="tablist">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tabRules">알림 규칙</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabLogs">발송 이력</a></li>
</ul>

<div class="tab-content">
    <!-- 알림 규칙 -->
    <div class="tab-pane fade show active" id="tabRules">
        <div class="small text-muted mb-3">이벤트별로 ON/OFF 하고 수신자를 지정하세요. 이벤트 발생 시 지정된 수신자에게 이메일이 발송됩니다.</div>

        <div id="ruleList">
            <div class="text-center text-muted py-4">로딩 중...</div>
        </div>

        <!-- 규칙 추가 -->
        <div class="card border-dashed mt-3">
            <div class="card-body py-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold mb-1">이벤트 추가</label>
                        <select class="form-select form-select-sm" id="newRuleEvent">
                            {% for code, label in event_choices %}
                            <option value="{{ code }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold mb-1">설명 (선택)</label>
                        <input type="text" class="form-control form-control-sm" id="newRuleDesc" placeholder="메모">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary btn-sm w-100" onclick="addRule()">
                            <i class="bi bi-plus-lg me-1"></i>규칙 추가
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 발송 이력 -->
    <div class="tab-pane fade" id="tabLogs">
        <button class="btn btn-outline-secondary btn-sm mb-2" onclick="loadLogs()"><i class="bi bi-arrow-clockwise me-1"></i>새로고침</button>
        <div class="table-responsive">
            <table class="table table-sm table-hover" style="font-size:0.85rem;">
                <thead class="table-light">
                    <tr><th>시각</th><th>이벤트</th><th>수신자</th><th>이메일</th><th>제목</th><th>상태</th></tr>
                </thead>
                <tbody id="logBody"><tr><td colspan="6" class="text-center text-muted">탭 클릭 시 로딩됩니다.</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 수신자 검색 모달 -->
<div class="modal fade" id="recipientSearchModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h6 class="modal-title fw-bold"><i class="bi bi-person-badge me-2"></i>수신자 선택</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control form-control-sm mb-2" id="empSearchInput" placeholder="이름 또는 부서명 검색..." autofocus>
                <div id="empSearchResults" style="max-height:350px;overflow-y:auto;">
                    <div class="text-center text-muted py-3">이름 또는 부서명으로 검색하세요</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.rule-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; background: #fff; transition: box-shadow 0.2s; }
.rule-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.rule-card.inactive { opacity: 0.5; background: #f9fafb; }
.recipient-badge { display: inline-flex; align-items: center; gap: 4px; background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; margin: 2px; }
.recipient-badge .remove-btn { cursor: pointer; opacity: 0.6; font-size: 0.7rem; }
.recipient-badge .remove-btn:hover { opacity: 1; color: #dc2626; }
.border-dashed { border: 2px dashed #d1d5db !important; }
</style>

<script>
var csrfToken = '{{ csrf_token }}';
var currentEditRuleId = null;

function loadRules() {
    fetch('{% url "admin_app:api_rules" %}').then(r => r.json()).then(data => {
        var container = document.getElementById('ruleList');
        if (!data.rules.length) {
            container.innerHTML = '<div class="text-center text-muted py-4">등록된 알림 규칙이 없습니다. 아래에서 추가하세요.</div>';
            return;
        }
        container.innerHTML = data.rules.map(r => {
            var recipientBadges = '';
            if (r.recipient_names) {
                r.recipient_names.split(', ').forEach((name, i) => {
                    var uid = r.recipient_ids[i];
                    recipientBadges += `<span class="recipient-badge">${name.trim()} <i class="bi bi-x remove-btn" onclick="removeRecipientFromRule(${r.id}, ${uid})"></i></span>`;
                });
            }

            var autoFlags = '';
            if (r.send_to_vendor) autoFlags += '<span class="badge bg-warning text-dark me-1">협력사</span>';
            if (r.send_to_requester) autoFlags += '<span class="badge bg-info text-dark me-1">의뢰자</span>';

            return `<div class="rule-card ${r.is_active ? '' : 'inactive'}">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input" type="checkbox" ${r.is_active ? 'checked' : ''} onchange="toggleRule(${r.id}, this.checked)">
                            </div>
                            <span class="fw-bold">${r.event_display}</span>
                            ${r.description ? `<span class="text-muted small">(${r.description})</span>` : ''}
                        </div>
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="small text-muted">자동발송:</span>
                            <div class="form-check form-check-inline mb-0">
                                <input class="form-check-input" type="checkbox" id="vendor_${r.id}" ${r.send_to_vendor ? 'checked' : ''} onchange="updateAutoSend(${r.id})">
                                <label class="form-check-label small" for="vendor_${r.id}">협력사</label>
                            </div>
                            <div class="form-check form-check-inline mb-0">
                                <input class="form-check-input" type="checkbox" id="requester_${r.id}" ${r.send_to_requester ? 'checked' : ''} onchange="updateAutoSend(${r.id})">
                                <label class="form-check-label small" for="requester_${r.id}">의뢰자</label>
                            </div>
                        </div>
                        <div class="d-flex align-items-center flex-wrap gap-1">
                            <span class="small text-muted me-1">수신자:</span>
                            ${recipientBadges || '<span class="text-muted small">없음</span>'}
                            <button class="btn btn-outline-secondary btn-sm py-0 px-1" onclick="openAddRecipient(${r.id})" title="수신자 추가" style="font-size:0.75rem;">
                                <i class="bi bi-person-plus"></i>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteRule(${r.id})" title="삭제">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>`;
        }).join('');
    });
}

function toggleRule(id, isActive) {
    apiPost({action: 'update', id: id, is_active: isActive});
}

function updateAutoSend(id) {
    apiPost({
        action: 'update', id: id,
        send_to_vendor: document.getElementById('vendor_' + id).checked,
        send_to_requester: document.getElementById('requester_' + id).checked,
    });
}

function addRule() {
    var eventType = document.getElementById('newRuleEvent').value;
    var desc = document.getElementById('newRuleDesc').value.trim();
    apiPost({action: 'add', event_type: eventType, description: desc}, function() {
        document.getElementById('newRuleDesc').value = '';
        loadRules();
    });
}

function deleteRule(id) {
    if (!confirm('이 규칙을 삭제하시겠습니까?')) return;
    apiPost({action: 'delete', id: id}, loadRules);
}

function removeRecipientFromRule(ruleId, userId) {
    // 현재 규칙의 수신자에서 해당 유저 제거
    fetch('{% url "admin_app:api_rules" %}').then(r => r.json()).then(data => {
        var rule = data.rules.find(r => r.id === ruleId);
        if (!rule) return;
        var newIds = rule.recipient_ids.filter(id => id !== userId);
        apiPost({action: 'update', id: ruleId, recipient_ids: newIds}, loadRules);
    });
}

// 수신자 추가 (직원 검색 모달)
function openAddRecipient(ruleId) {
    currentEditRuleId = ruleId;
    document.getElementById('empSearchInput').value = '';
    document.getElementById('empSearchResults').innerHTML = '<div class="text-center text-muted py-3">이름 또는 부서명으로 검색하세요</div>';
    new bootstrap.Modal(document.getElementById('recipientSearchModal')).show();
    setTimeout(() => document.getElementById('empSearchInput').focus(), 300);
}

function searchEmployees() {
    var q = document.getElementById('empSearchInput').value.trim();
    if (q.length < 1) return;
    fetch('/api/employees/search/?q=' + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
            var results = data.results || [];
            var container = document.getElementById('empSearchResults');
            if (!results.length) {
                container.innerHTML = '<div class="text-center text-muted py-3">검색 결과가 없습니다</div>';
                return;
            }
            container.innerHTML = results.map(emp =>
                `<button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                         onclick="addRecipientToRule(${emp.id}, '${escapeHtml(emp.label)}')">
                    <div>
                        ${emp.department ? `<span class="badge bg-secondary me-2">${escapeHtml(emp.department)}</span>` : ''}
                        <span class="fw-bold">${escapeHtml(emp.display_name)}</span>
                    </div>
                    <span class="badge bg-primary">추가</span>
                </button>`
            ).join('');
        });
}

function addRecipientToRule(userId, label) {
    if (!currentEditRuleId) return;
    // 현재 규칙의 수신자 목록에 추가
    fetch('{% url "admin_app:api_rules" %}').then(r => r.json()).then(data => {
        var rule = data.rules.find(r => r.id === currentEditRuleId);
        if (!rule) return;
        if (rule.recipient_ids.includes(userId)) {
            alert('이미 추가된 수신자입니다.');
            return;
        }
        var newIds = rule.recipient_ids.concat([userId]);
        apiPost({action: 'update', id: currentEditRuleId, recipient_ids: newIds}, function() {
            bootstrap.Modal.getInstance(document.getElementById('recipientSearchModal')).hide();
            loadRules();
        });
    });
}

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function apiPost(data, callback) {
    fetch('{% url "admin_app:api_rules" %}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
        body: JSON.stringify(data)
    }).then(r => r.json()).then(d => {
        if (d.success) { if (callback) callback(); }
        else alert(d.error);
    });
}

// 발송 이력
function loadLogs() {
    fetch('{% url "admin_app:api_notification_logs" %}').then(r => r.json()).then(data => {
        var tb = document.getElementById('logBody');
        if (!data.logs.length) { tb.innerHTML = '<tr><td colspan="6" class="text-center text-muted">발송 이력이 없습니다.</td></tr>'; return; }
        tb.innerHTML = data.logs.map(l =>
            '<tr>' +
            '<td class="small">' + l.created_at + '</td>' +
            '<td>' + l.event_display + '</td>' +
            '<td>' + l.recipient_name + '</td>' +
            '<td class="small">' + l.recipient_email + '</td>' +
            '<td class="small">' + l.subject + '</td>' +
            '<td><span class="badge ' + (l.status=='SENT'?'bg-success':l.status=='FAILED'?'bg-danger':'bg-warning text-dark') + '">' + l.status_display + '</span></td>' +
            '</tr>'
        ).join('');
    });
}

// 이벤트
document.getElementById('empSearchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); searchEmployees(); }
});
document.querySelector('a[href="#tabLogs"]').addEventListener('shown.bs.tab', loadLogs);
loadRules();
</script>
{% endblock %}
